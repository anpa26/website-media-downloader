<html class="mdui-theme-auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-translate="downloadWaiting">Saving Media...</title>
  <link rel="stylesheet" href="styles/mdui.css">
  <script src="libraries/mdui.global.js"></script>
  <style>
    :root {
      --app-border-radius: 24px;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: rgb(var(--mdui-color-surface));
      color: rgb(var(--mdui-color-on-surface));
    }
    .card {
      background: rgb(var(--mdui-color-surface-container-low));
      padding: 32px;
      border-radius: var(--app-border-radius);
      border: 1px solid rgb(var(--mdui-color-outline-variant));
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #status-title { margin: 0 0 12px; font-size: 1.5rem; font-weight: 700; color: rgb(var(--mdui-color-primary)); }
    #status-text { margin: 0 0 24px; font-size: 0.95rem; line-height: 1.6; opacity: 0.8; }
    .action-area { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    #save-button { width: 100%; }
    #close-button { width: 100%; }

    .icon-container {
      width: 64px;
      height: 64px;
      background: rgb(var(--mdui-color-primary-container));
      color: rgb(var(--mdui-color-on-primary-container));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .footer-text { font-size: 0.75rem; opacity: 0.5; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <mdui-icon style="font-size: 32px;">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
      </mdui-icon>
    </div>
    <h3 id="status-title" data-translate="downloadPreparing">Preparing...</h3>
    <p id="status-text" data-translate="downloadReconstructing">Reconstructing your media file from segments. This may take a moment depending on the file size.</p>

    <div class="action-area">
        <mdui-button id="save-button" variant="filled" style="display: none;" data-translate="saveToDevice">Save to Device</mdui-button>
        <div id="cloud-upload-controls" style="display: none; flex-direction: column; gap: 12px; width: 100%;">
            <mdui-button id="pause-upload-button" variant="tonal" data-translate="pauseButton">Pause Upload</mdui-button>
            <mdui-button id="resume-upload-button" variant="filled" style="display: none;" data-translate="resumeButton">Resume Upload</mdui-button>
            <mdui-button id="cancel-upload-button" variant="outlined" data-translate="cancelButton">Cancel Upload</mdui-button>
        </div>
        <mdui-button id="close-button" variant="tonal" data-translate="closeTab">Close Tab</mdui-button>
    </div>
  </div>
  <script src="translations.js"></script>
  <script src="download.js"></script>
</body>
</html>
