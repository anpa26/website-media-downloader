name: Manual Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit ID to release (e.g., a1b2c3d)'
        required: true
      tag_name:
        description: 'Tag name for the release (e.g., v1.5.3)'
        required: true
      release_name:
        description: 'Name of the release (leave empty to use commit title)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Commit Details
        id: commit_info
        run: |
          SHA="${{ github.event.inputs.commit_sha }}"
          TITLE=$(git log -1 --pretty=%s "$SHA")
          BODY=$(git log -1 --pretty=%b "$SHA")
          
          # Use provided release_name or fallback to commit title
          CUSTOM_NAME="${{ github.event.inputs.release_name }}"
          if [ -n "$CUSTOM_NAME" ]; then
            FINAL_NAME="$CUSTOM_NAME"
          else
            FINAL_NAME="$TITLE"
          fi
          
          echo "release_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          
          if [ -z "$BODY" ]; then
            echo "body=$TITLE" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Archive (XPI)
        run: |
          # Package the latest source code from the current checkout
          cd src
          zip -r ../addon.xpi ./*
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ steps.commit_info.outputs.release_name }}
          body: ${{ steps.commit_info.outputs.body }}
          files: addon.xpi
          target_commitish: ${{ github.event.inputs.commit_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
